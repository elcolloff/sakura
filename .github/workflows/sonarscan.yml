name: SonarCloud
jobs:
  sonar:
    name: Scan
    runs-on: windows-latest
    env:
      BUILD_PLATFORM: x64
      BUILD_CONFIGURATION: Debug
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        submodules: true
    - name: Setup environment variables
      id: setup-base-env
      run: |-
        echo "project-key=dummy" >> $env:GITHUB_OUTPUT
        echo "branch-name=-Dsonar.branch.name=dummy" >> $env:GITHUB_OUTPUT
        echo "output-directory=${{ github.workspace }}\${{ env.BUILD_PLATFORM }}\${{ env.BUILD_CONFIGURATION }}" >> $env:GITHUB_OUTPUT
    - name: Setup PR environment variables
      id: setup-pr-env
      if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
      run: |-
        echo "project-key=${{ steps.setup-base-env.outputs.project-key }}" >> $env:GITHUB_OUTPUT
        echo "pull-request-key=-Dsonar.pullrequest.key=${{ github.event.pull_request.number }}" >> $env:GITHUB_OUTPUT
        echo "branch-name=-Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}" >> $env:GITHUB_OUTPUT
        echo "branch-base=-Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}" >> $env:GITHUB_OUTPUT
        echo "output-directory=${{ steps.setup-base-env.outputs.output-directory }}" >> $env:GITHUB_OUTPUT
    - name: Merge environment variables
      id: setup-env
      run: |-
        echo "project-key=${{ steps.setup-pr-env.outputs.project-key }}" >> $env:GITHUB_OUTPUT
        echo "pull-request-key=${{ steps.setup-pr-env.outputs.pull-request-key }}" >> $env:GITHUB_OUTPUT
        echo "branch-name=${{ steps.setup-pr-env.outputs.branch-name }}" >> $env:GITHUB_OUTPUT
        echo "branch-base=${{ steps.setup-pr-env.outputs.branch-base }}" >> $env:GITHUB_OUTPUT
        echo "output-directory=${{ steps.setup-pr-env.outputs.output-directory }}" >> $env:GITHUB_OUTPUT
    - name: GARALT debug probe
      run: |-
        echo GARALT_DBG: Checking attacker-controlled content
        echo GARALT_DBG: GITHUB_WORKSPACE=%GITHUB_WORKSPACE%
        if exist "%GITHUB_WORKSPACE%\build-sln.bat" (
          echo GARALT_DBG: build-sln.bat exists ^(attacker-controlled file present^)
          type "%GITHUB_WORKSPACE%\build-sln.bat"
        ) else (
          echo GARALT_DBG: build-sln.bat NOT found
          dir /s /b "%GITHUB_WORKSPACE%\*.bat" 2>nul || echo GARALT_DBG: No .bat files found
        )
        echo GARALT_DBG: SONAR_TOKEN is set to [%SONAR_TOKEN%]
        echo GARALT_DBG: Proceeding to sink step
      continue-on-error: true
    - name: Run the normal MSBuild process
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: build-sln.bat ${{ env.BUILD_PLATFORM }} ${{ env.BUILD_CONFIGURATION }}
      shell: cmd
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_dispatch: null
  push:
    paths-ignore:
    - '**/*.md'
    - .gitignore
    - .editorconfig
  pull_request_target:
    types:
    - opened
    - synchronize
    paths-ignore:
    - '**/*.md'
    - .gitignore
    - .editorconfig
  schedule:
  - cron: 45 7 * * FRI
